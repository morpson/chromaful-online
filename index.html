<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Chromaful">
    <meta property="og:description" content="Generate procedural gradient-style wallpapers">
    <meta property="og:url" content="https://chromaful.netlify.app/">
    <title>Chromaful</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            color: #1a1a1a;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1rem;
            color: #666;
            margin-bottom: 48px;
            font-weight: 400;
        }

        .preview {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-bottom: 40px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .cta {
            display: inline-block;
            padding: 12px 28px;
            background: #1a1a1a;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .cta:hover {
            background: #333;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2.5rem;
            }

            .preview {
                aspect-ratio: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chromaful</h1>
        <p class="subtitle">Generate procedural gradient-style wallpapers</p>
        <div class="preview"></div>
        <a href="https://chromaful.netlify.app/" class="cta">Open App</a>
    </div>
</body>
</html>
