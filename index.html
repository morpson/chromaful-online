<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromaful - Procedural Wallpaper Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .content {
            color: white;
            z-index: 10;
        }

        .content h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: 800;
            letter-spacing: -2px;
        }

        .content p {
            font-size: 1.3rem;
            margin-bottom: 30px;
            opacity: 0.95;
            line-height: 1.6;
        }

        .features {
            margin: 40px 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.1rem;
        }

        .feature-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: white;
            color: #667eea;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-3px);
        }

        .showcase {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-box {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .preview-content {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff006e, #8338ec, #3a86ff, #06ffa5);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: white;
            opacity: 0.9;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .content h1 {
                font-size: 2.5rem;
            }

            .content p {
                font-size: 1.1rem;
            }

            .cta-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>Chromaful</h1>
            <p>Generate stunning procedural wallpapers with infinite color combinations.</p>

            <div class="features">
                <div class="feature">
                    <div class="feature-icon">✨</div>
                    <span>Infinite procedural generation</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">🎨</div>
                    <span>Beautiful color palettes</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">⚡</div>
                    <span>Instant creation</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">📥</div>
                    <span>Easy download</span>
                </div>
            </div>

            <div class="cta-buttons">
                <a href="https://chromaful.netlify.app/" class="btn btn-primary">
                    🚀 Try It Now
                </a>
                <a href="https://github.com/morpson/chromaful-online" class="btn btn-secondary">
                    ⭐ View on GitHub
                </a>
            </div>
        </div>

        <div class="showcase">
            <div class="preview-box">
                <div class="preview-content">
                    🌈
                </div>
            </div>
        </div>
    </div>
</body>
</html>
