<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Chromaful">
    <meta property="og:description" content="Generate procedural gradient-style wallpapers">
    <meta property="og:url" content="https://chromaful.netlify.app/">
    <meta property="og:image" content="https://chromaful.netlify.app/og-image.png">
    <title>Chromaful</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            color: #1a1a1a;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 48px;
            font-weight: 400;
            line-height: 1.5;
        }

        .preview {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff, #06ffa5);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            margin-bottom: 48px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .cta {
            display: inline-block;
            padding: 14px 32px;
            background: #1a1a1a;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            border: 2px solid #1a1a1a;
        }

        .cta:hover {
            background: white;
            color: #1a1a1a;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .preview {
                aspect-ratio: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chromaful</h1>
        <p class="subtitle">Generate procedural gradient-style wallpapers</p>
        <div class="preview"></div>
        <a href="https://chromaful.netlify.app/" class="cta">Open App →</a>
    </div>
</body>
</html>
